<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MineKing</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#f5f5f0;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}#app{width:100%;max-width:900px}h1{font-size:22px;font-weight:500;margin-bottom:16px;color:#1a1a1a}#topbar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}.tab{font-size:13px;padding:5px 14px;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;background:#eee;color:#555}.tab.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}.pts-badge{margin-left:auto;font-size:13px;font-weight:500;background:#eee;border:0.5px solid #ccc;border-radius:8px;padding:5px 12px}#game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}#info{display:flex;gap:16px}.stat{font-size:13px;color:#666}.stat span{font-size:15px;font-weight:500;color:#111}#smiley{font-size:20px;cursor:pointer;border:0.5px solid #ccc;border-radius:8px;padding:3px 10px;background:#eee}#diff{display:flex;gap:6px;margin-bottom:10px}.dbtn{font-size:12px;padding:4px 10px;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;background:#eee;color:#555}.dbtn.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}#board{display:inline-grid;gap:2px;border:0.5px solid #ccc;border-radius:10px;padding:6px;background:#e5e5e0}.cell{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;border-radius:4px;cursor:pointer;border:0.5px solid #ddd;background:#fff;user-select:none}.cell:not(.open):hover{filter:brightness(0.93)}.cell.open{background:transparent!important;border-color:transparent!important;cursor:default}.cell.open.numbered{cursor:pointer}.cell.open.numbered:hover{background:#eee!important;border-color:#ddd!important;filter:none}.cell.flag{background:#fef3c7!important}.cell.mine{background:#fee2e2!important;border-color:transparent!important}.n1{color:#1d4ed8}.n2{color:#15803d}.n3{color:#b91c1c}.n4{color:#6d28d9}.n5{color:#c2410c}.n6{color:#0f766e}.n7{color:#1c1c1c}.n8{color:#666}#msg{margin-top:8px;font-size:14px;font-weight:500;min-height:22px}.pts-popup{font-size:12px;color:#15803d;margin-left:6px}#shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:10px}.skin-card{border:0.5px solid #ccc;border-radius:12px;padding:12px;background:#eee}.skin-card.is-active{border:2px solid #93c5fd}.skin-preview{width:100%;height:48px;border-radius:6px;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:4px;margin-bottom:8px;background:#ddd}.sp-cell{border-radius:3px}.skin-name{font-size:13px;font-weight:500;color:#111;margin-bottom:2px}.skin-sub{font-size:12px;color:#666;margin-bottom:7px}.skin-btn{width:100%;font-size:12px;padding:4px 0;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#111}.skin-btn.buy-btn{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}.skin-btn.act-btn{background:#dcfce7;color:#15803d;border-color:#86efac}.skin-btn:disabled{opacity:0.35;cursor:default}#score-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}.sc-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;background:#eee}.sc-diff{font-weight:500;width:60px}.sc-time{color:#666}.sc-pts{color:#1d4ed8;font-weight:500}.sc-date{font-size:11px;color:#999}.hint{font-size:12px;color:#666;margin-bottom:6px}</style></head><body><div id="app"><h1>MineKing</h1><div id="topbar"><button class="tab active" onclick="showTab('game')">Spiel</button><button class="tab" onclick="showTab('shop')">Shop</button><button class="tab" onclick="showTab('scores')">Bestenliste</button><div class="pts-badge">Punkte: <span id="pts-top">0</span></div></div><div id="tab-game"><div id="game-header"><div id="info"><div class="stat">Minen: <span id="mcount">10</span></div><div class="stat">Zeit: <span id="timer">0</span>s</div></div><div id="smiley" onclick="restart()">:)</div></div><div id="diff"><button class="dbtn active" onclick="setDiff(0)">Leicht</button><button class="dbtn" onclick="setDiff(1)">Mittel</button><button class="dbtn" onclick="setDiff(2)">Schwer</button></div><div id="board"></div><div id="msg"></div></div><div id="tab-shop" style="display:none"><div class="hint">Gewinne Runden um Punkte zu verdienen. Rechtsklick = Flagge.</div><div class="hint">Punkte: Leicht 50+, Mittel 150+, Schwer 400+</div><div id="shop-grid"></div></div><div id="tab-scores" style="display:none"><div class="hint">Letzte 20 Runden:</div><div id="score-list"></div></div></div><style id="skin-style"></style><script>const DIFFS=[{r:9,c:9,m:10,name:'Leicht'},{r:16,c:16,m:40,name:'Mittel'},{r:16,c:30,m:99,name:'Schwer'}];const PTS_BASE=[50,150,400],PTS_TIME_CAP=[60,120,300],PTS_TIME_MULT=[2,3,2];const SKINS=[{id:'classic',name:'Classic',price:0,previewCells:['#e8e8e8','#e8e8e8','#fef3c7','#e8e8e8','#e8e8e8']},{id:'navy',name:'Navy',price:150,css:'.cell:not(.open):not(.mine){background:#B5D4F4!important;border-color:#85B7EB!important}.cell.flag{background:#378ADD!important}',previewCells:['#B5D4F4','#B5D4F4','#378ADD','#B5D4F4','#85B7EB']},{id:'forest',name:'Forest',price:200,css:'.cell:not(.open):not(.mine){background:#C0DD97!important;border-color:#97C459!important}.cell.flag{background:#639922!important}',previewCells:['#C0DD97','#C0DD97','#639922','#C0DD97','#97C459']},{id:'lava',name:'Lava',price:300,css:'.cell:not(.open):not(.mine){background:#F5C4B3!important;border-color:#F0997B!important}.cell.flag{background:#D85A30!important}',previewCells:['#F5C4B3','#F5C4B3','#D85A30','#F5C4B3','#F0997B']},{id:'candy',name:'Candy',price:400,css:'.cell:not(.open):not(.mine){background:#F4C0D1!important;border-color:#ED93B1!important}.cell.flag{background:#D4537E!important}',previewCells:['#F4C0D1','#F4C0D1','#D4537E','#F4C0D1','#ED93B1']},{id:'gold',name:'Gold',price:600,css:'.cell:not(.open):not(.mine){background:#FAC775!important;border-color:#EF9F27!important}.cell.flag{background:#BA7517!important}',previewCells:['#FAC775','#FAC775','#BA7517','#FAC775','#EF9F27']},{id:'midnight',name:'Midnight',price:800,css:'.cell:not(.open):not(.mine){background:#AFA9EC!important;border-color:#7F77DD!important}.cell.flag{background:#534AB7!important}',previewCells:['#AFA9EC','#AFA9EC','#534AB7','#AFA9EC','#7F77DD']},{id:'mint',name:'Mint',price:1000,css:'.cell:not(.open):not(.mine){background:#9FE1CB!important;border-color:#5DCAA5!important}.cell.flag{background:#0F6E56!important}',previewCells:['#9FE1CB','#9FE1CB','#0F6E56','#9FE1CB','#5DCAA5']}];let data={points:0,owned:['classic'],active:'classic',scores:[]};let d=0,rows,cols,mines,board,revealed,flags,gameOver,started,tick,elapsed;function loadData(){try{const s=localStorage.getItem('mk_save');if(s)data=JSON.parse(s);}catch(e){}updatePts();applySkin();}function saveData(){try{localStorage.setItem('mk_save',JSON.stringify(data));}catch(e){}}function updatePts(){document.getElementById('pts-top').textContent=data.points;}function applySkin(){const s=SKINS.find(x=>x.id===data.active)||SKINS[0];document.getElementById('skin-style').textContent=s.css||'';}function showTab(t){['game','shop','scores'].forEach(n=>document.getElementById('tab-'+n).style.display=n===t?'':'none');document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['game','shop','scores'][i]===t));if(t==='shop')renderShop();if(t==='scores')renderScores();}function renderShop(){const el=document.getElementById('shop-grid');el.innerHTML='';SKINS.forEach(s=>{const owned=data.owned.includes(s.id),active=data.active===s.id;const card=document.createElement('div');card.className='skin-card'+(active?' is-active':'');const prev=s.previewCells.map(c=>'<div class="sp-cell" style="background:'+c+'"></div>').join('');let btnClass='',btnTxt='',dis='';if(active){btnClass='act-btn';btnTxt='Aktiv';}else if(owned){btnTxt='Aktivieren';}else{btnClass='buy-btn';btnTxt=s.price+' Pkt.';if(data.points<s.price)dis='disabled';}const sub=s.price===0?'Kostenlos':owned?'Gekauft':s.price+' Punkte';card.innerHTML='<div class="skin-preview">'+prev+'</div><div class="skin-name">'+s.name+'</div><div class="skin-sub">'+sub+'</div><button class="skin-btn '+btnClass+'" '+dis+' onclick="skinAction(''+s.id+'')">'+btnTxt+'</button>';el.appendChild(card);});}function skinAction(id){const s=SKINS.find(x=>x.id===id);if(!s)return;if(!data.owned.includes(id)){if(data.points<s.price)return;data.points-=s.price;data.owned.push(id);updatePts();}data.active=id;applySkin();saveData();renderShop();}function renderScores(){const el=document.getElementById('score-list');if(!data.scores.length){el.innerHTML='<div class="hint">Noch keine Runden.</div>';return;}el.innerHTML='';[...data.scores].reverse().slice(0,20).forEach(sc=>{const row=document.createElement('div');row.className='sc-row';row.innerHTML='<span class="sc-diff">'+sc.diff+'</span><span class="sc-time">'+sc.time+'s</span><span class="sc-pts">+'+sc.pts+' Pkt.</span><span class="sc-date">'+sc.date+'</span>';el.appendChild(row);});}function calcPts(di,t){return PTS_BASE[di]+Math.max(0,PTS_TIME_CAP[di]-t)*PTS_TIME_MULT[di];}function onWin(){const pts=calcPts(d,elapsed);data.points+=pts;const now=new Date();data.scores.push({diff:DIFFS[d].name,time:elapsed,pts,date:now.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'})});if(data.scores.length>50)data.scores=data.scores.slice(-50);updatePts();saveData();document.getElementById('msg').innerHTML='Gewonnen! <span class="pts-popup">+'+pts+' Punkte</span>';document.getElementById('smiley').textContent=':D';}function setDiff(i){d=i;document.querySelectorAll('.dbtn').forEach((b,j)=>b.classList.toggle('active',j===i));restart();}function restart(){clearInterval(tick);const cfg=DIFFS[d];rows=cfg.r;cols=cfg.c;mines=cfg.m;board=Array.from({length:rows},()=>Array(cols).fill(0));revealed=Array.from({length:rows},()=>Array(cols).fill(false));flags=Array.from({length:rows},()=>Array(cols).fill(false));gameOver=false;started=false;elapsed=0;document.getElementById('timer').textContent='0';document.getElementById('mcount').textContent=mines;document.getElementById('msg').textContent='';document.getElementById('smiley').textContent=':)';render();}function placeMines(er,ec){let p=0;while(p<mines){const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);if(board[r][c]===-1||Math.abs(r-er)<=1&&Math.abs(c-ec)<=1)continue;board[r][c]=-1;p++;}for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(board[r][c]===-1)continue;let n=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]===-1)n++;}board[r][c]=n;}}function nb(r,c){const res=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols)res.push([nr,nc]);}return res;}function reveal(r,c){if(r<0||r>=rows||c<0||c>=cols||revealed[r][c]||flags[r][c])return;revealed[r][c]=true;if(board[r][c]===0)nb(r,c).forEach(([nr,nc])=>reveal(nr,nc));}function chord(r,c){if(!revealed[r][c]||board[r][c]<=0)return;const ns=nb(r,c);if(ns.filter(([nr,nc])=>flags[nr][nc]).length!==board[r][c])return;let hit=false;ns.forEach(([nr,nc])=>{if(!flags[nr][nc]&&!revealed[nr][nc]){if(board[nr][nc]===-1){revealed[nr][nc]=true;hit=true;}else reveal(nr,nc);}});if(hit){gameOver=true;clearInterval(tick);for(let i=0;i<rows;i++)for(let j=0;j<cols;j++)if(board[i][j]===-1)revealed[i][j]=true;document.getElementById('msg').textContent='Treffer!';document.getElementById('smiley').textContent=':(';}else checkWin();render();}function click(r,c){if(gameOver)return;if(revealed[r][c]){if(board[r][c]>0)chord(r,c);return;}if(flags[r][c])return;if(!started){started=true;placeMines(r,c);tick=setInterval(()=>{elapsed++;document.getElementById('timer').textContent=elapsed;},1000);}if(board[r][c]===-1){revealed[r][c]=true;gameOver=true;clearInterval(tick);for(let i=0;i<rows;i++)for(let j=0;j<cols;j++)if(board[i][j]===-1)revealed[i][j]=true;document.getElementById('msg').textContent='Treffer!';document.getElementById('smiley').textContent=':(';render();return;}reveal(r,c);checkWin();render();}function rightClick(e,r,c){e.preventDefault();if(gameOver||revealed[r][c])return;flags[r][c]=!flags[r][c];document.getElementById('mcount').textContent=mines-flags.flat().filter(Boolean).length;render();}function checkWin(){for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(board[r][c]!==-1&&!revealed[r][c])return;gameOver=true;clearInterval(tick);onWin();}function render(){const el=document.getElementById('board');el.style.gridTemplateColumns='repeat('+cols+',28px)';el.innerHTML='';for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const cell=document.createElement('div');cell.className='cell';if(revealed[r][c]){cell.classList.add('open');if(board[r][c]===-1){cell.classList.add('mine');cell.textContent='*';}else if(board[r][c]>0){cell.textContent=board[r][c];cell.classList.add('n'+board[r][c],'numbered');}}else if(flags[r][c]){cell.classList.add('flag');cell.textContent='F';}cell.onclick=()=>click(r,c);cell.oncontextmenu=e=>rightClick(e,r,c);el.appendChild(cell);}}loadData();restart();</script></body></html>
